buildscript {
    repositories {
        google()
        jcenter()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:3.5.0'
    }
}

allprojects {
    repositories {
        google()
        jcenter()
    }
}

apply plugin: 'com.android.application'

android {
    compileSdkVersion 10
    buildToolsVersion "29.0.3"

    defaultConfig {
        applicationId "com.minipc.kiosk"
        minSdkVersion 10
        targetSdkVersion 10
        versionCode 1
        versionName "1.0"
    }
    
    // Disable linting because API 10 throws tons of warnings
    lintOptions {
        abortOnError false
    }
}
